Yardstick Head Barista Sensory Practice Checklist

Before the June 24 practical workshop, confirm that you can:

[ ] Explain why sensory evaluation matters for quality control, calibration, coaching, and customer communication.
[ ] Distinguish difference, affective, and descriptive tests.
[ ] Explain orthonasal olfaction, retronasal olfaction, gustation, and tactile perception.
[ ] Identify sweet, sour, salty, bitter, and umami.
[ ] Rank coded taste samples from low to medium to high intensity.
[ ] Use the flavor wheel from broad category to specific descriptor.
[ ] Separate descriptive notes from affective judgments.
[ ] Identify common sensory biases and errors.
[ ] Use simplified CVA descriptive and affective forms.
[ ] Put the cupping workflow in order.
